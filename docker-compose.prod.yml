name: projeto-ii-prod

services:
  mysql:
    image: mysql:9.6.0
    restart: always
    volumes:
      - ./.data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/joaosantos99/projeto-ii-server:latest
    build: ./server
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: mysql
      DB_PORT: 3306
      # sequelize-cli production config reads DATABASE_URL for migrations
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      FRONTEND_URL: https://${DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}

  web:
    image: ghcr.io/joaosantos99/projeto-ii-web:latest
    build:
      context: ./web
      args:
        # Baked into the client bundle → browser talks to api.domain.com
        VITE_API_URL: https://${API_DOMAIN}
    restart: always
    depends_on:
      - server
    environment:
      PORT: 4173
      # Internal URL for RSC server-side fetches (skips the public hairpin)
      API_INTERNAL_URL: http://server:3000

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - web
      - server
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.data/caddy:/data
      - ./.data/caddy-config:/config
